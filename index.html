<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>π Memorization Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f1a;
      --surface: #1a1a2e;
      --correct: #4ecca3;
      --error:   #e94560;
      --text:    #eaeaea;
      --dim:     #555;
      --dim2:    #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      text-align: center;
      width: 680px;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 0.08em;
      margin-bottom: 0.25rem;
      color: var(--text);
    }

    #subtitle {
      font-size: 0.85rem;
      color: var(--dim2);
      margin-bottom: 2.5rem;
    }

    /* Big counter */
    #count {
      font-size: 7rem;
      font-weight: bold;
      color: var(--correct);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    body.failed #count { color: var(--error); }

    #count-label {
      font-size: 0.9rem;
      color: var(--dim2);
      margin-top: 0.3rem;
      margin-bottom: 2rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Digit tape */
    #tape-wrap {
      background: var(--surface);
      border-radius: 8px;
      padding: 0.9rem 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 3.4rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      overflow: hidden;
    }

    #tape {
      font-size: 1.5rem;
      letter-spacing: 0.18em;
      color: var(--text);
      opacity: 0.8;
      white-space: nowrap;
    }

    /* Blinking cursor after tape when active */
    body:not(.failed) #tape::after {
      content: '|';
      animation: blink 1s step-end infinite;
      color: var(--correct);
      opacity: 1;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    body.failed #tape { opacity: 0.2; }

    /* Error panel */
    #error {
      background: var(--error);
      color: #fff;
      border-radius: 10px;
      padding: 1.4rem 2rem;
      margin-bottom: 1.5rem;
      line-height: 1.9;
    }

    #error.hidden { display: none; }

    #error-heading {
      font-size: 1.8rem;
      font-weight: bold;
      margin-bottom: 0.3rem;
    }

    #error-detail { font-size: 1.1rem; }

    #error-score {
      font-size: 1rem;
      opacity: 0.85;
      margin-top: 0.4rem;
    }

    /* Status / hint line */
    #status {
      color: var(--dim2);
      font-size: 1rem;
      margin-bottom: 0.6rem;
      min-height: 1.4em;
    }

    #hint {
      color: var(--dim);
      font-size: 0.82rem;
    }

    kbd {
      background: var(--surface);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 1px 6px;
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--dim2);
    }

    /* No-digits-file error */
    #load-error {
      background: #2a0a0e;
      border: 1px solid var(--error);
      border-radius: 10px;
      padding: 2rem;
      text-align: left;
      line-height: 2;
    }

    #load-error strong { color: var(--error); font-size: 1.1rem; }
    #load-error code {
      background: #111;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      display: block;
      margin: 0.5rem 0;
      font-size: 1rem;
      color: var(--correct);
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #222;
    }

    #footer-name {
      font-size: 0.95rem;
      color: var(--dim2);
    }

    #footer-company {
      font-size: 0.8rem;
      color: var(--dim);
      margin-top: 0.2rem;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
<div id="app">
  <h1>π Memorization</h1>
  <div id="subtitle">How many digits of pi can you remember?</div>

  <div id="count">1</div>
  <div id="count-label">digits correct</div>

  <div id="tape-wrap">
    <div id="tape">3</div>
  </div>

  <div id="error" class="hidden">
    <div id="error-heading">Wrong!</div>
    <div id="error-detail">
      You typed <strong id="typed-char"></strong>,
      expected <strong id="expected-char"></strong>
    </div>
    <div id="error-score">Score: <span id="score-val"></span> digit<span id="score-plural"></span></div>
  </div>

  <div id="status">Type the digits of π from memory — start with 1</div>
  <div id="hint">Press <kbd>r</kbd> to reset at any time</div>

  <footer>
    <div id="footer-company">Kallukalam Industries</div>
  </footer>
</div>

<script src="pi_digits.js"></script>
<script>
(function () {
  'use strict';

  // Guard: pi_digits.js must be loaded before this script
  if (typeof PI_DIGITS === 'undefined' || PI_DIGITS.length === 0) {
    document.getElementById('app').innerHTML = `
      <div id="load-error">
        <strong>pi_digits.js not found!</strong><br>
        Generate it first by running:<br>
        <code>python3 generate_pi.py</code>
        Then reload this page.
      </div>`;
    return;
  }

  // Cache DOM — never query in the hot path
  const countEl    = document.getElementById('count');
  const tapeEl     = document.getElementById('tape');
  const statusEl   = document.getElementById('status');
  const errorEl    = document.getElementById('error');
  const typedEl    = document.getElementById('typed-char');
  const expectedEl = document.getElementById('expected-char');
  const scoreValEl = document.getElementById('score-val');
  const scorePlEl  = document.getElementById('score-plural');

  const TAPE_LEN = 38;

  // State — all mutable state is here, nothing else
  let state = 'active'; // 'active' | 'failed'
  let idx   = 1;        // '3' is pre-seeded; user starts from '1'
  let tape  = '3';

  function reset() {
    state = 'active';
    idx   = 1;
    tape  = '3';
    countEl.textContent = '1';
    tapeEl.textContent  = '3';
    statusEl.textContent = 'Type the digits of π from memory — start with 1';
    errorEl.classList.add('hidden');
    document.body.classList.remove('failed');
  }

  function fail(typedChar, expectedChar) {
    state = 'failed';
    typedEl.textContent    = typedChar;
    expectedEl.textContent = expectedChar;
    scoreValEl.textContent = idx;
    scorePlEl.textContent  = idx === 1 ? '' : 's';
    statusEl.textContent   = 'Press r to try again';
    errorEl.classList.remove('hidden');
    document.body.classList.add('failed');
  }

  document.addEventListener('keydown', function (e) {
    // r/R resets from any state — highest priority
    if (e.key === 'r' || e.key === 'R') {
      reset();
      return;
    }

    if (state !== 'active') return;

    // Ignore everything that isn't a digit (0-9, including numpad)
    if (!/^[0-9]$/.test(e.key)) return;

    // Hot path — O(1) string index, two textContent writes, nothing else
    const digit    = e.key;
    const expected = PI_DIGITS[idx];

    if (digit === expected) {
      idx++;
      tape = (tape + digit).slice(-TAPE_LEN);
      countEl.textContent = idx;
      tapeEl.textContent  = tape;

      if (idx >= PI_DIGITS.length) {
        statusEl.textContent = '🎉 PERFECT — all ' + PI_DIGITS.length.toLocaleString() + ' digits correct!';
        state = 'failed';
      }
    } else {
      fail(digit, expected);
    }
  });

})();
</script>
</body>
</html>
